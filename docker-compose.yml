volumes:
  postgres_data:
  uploads_data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: tokensite_postgres
    restart: always
    environment:
      POSTGRES_DB: tokensite
      POSTGRES_USER: tokensite
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tokensite_backend
    restart: always
    env_file: .env
    volumes:
      - uploads_data:/data/uploads
    ports:
      - "0.0.0.0:4000:4000"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tokensite_frontend
    restart: always
    env_file: .env
    depends_on:
      - backend
    ports:
      - "0.0.0.0:3000:3000"
