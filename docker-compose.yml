volumes:
  sqlite_data:

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tokensite_backend
    restart: always
    env_file: .env
    volumes:
      - sqlite_data:/data
    ports:
      - "127.0.0.1:4000:4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tokensite_frontend
    restart: always
    env_file: .env
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3000:3000"
