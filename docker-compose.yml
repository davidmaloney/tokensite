version: "3.9"

volumes:
  sqlite_data:

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tokensite_backend
    restart: always
    env_file: .env
    network_mode: host
    volumes:
      - sqlite_data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tokensite-backend.rule=HostRegexp(`{subdomain:[a-z0-9-]+}.tokensite.fun`)"
      - "traefik.http.routers.tokensite-backend.priority=10"
      - "traefik.http.routers.tokensite-backend.entrypoints=websecure"
      - "traefik.http.routers.tokensite-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.tokensite-backend.loadbalancer.server.port=4000"
      - "traefik.http.routers.tokensite-api.rule=Host(`tokensite.fun`) && PathPrefix(`/api`)"
      - "traefik.http.routers.tokensite-api.priority=20"
      - "traefik.http.routers.tokensite-api.entrypoints=websecure"
      - "traefik.http.routers.tokensite-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.tokensite-api.service=tokensite-backend"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tokensite_frontend
    restart: always
    env_file: .env
    network_mode: host
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tokensite-frontend.rule=Host(`tokensite.fun`)"
      - "traefik.http.routers.tokensite-frontend.priority=5"
      - "traefik.http.routers.tokensite-frontend.entrypoints=websecure"
      - "traefik.http.routers.tokensite-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.tokensite-frontend.loadbalancer.server.port=3000"
