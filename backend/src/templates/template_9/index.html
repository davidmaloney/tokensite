<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{TOKEN_NAME}}</title>
  {{OG_TAGS}}
  {{CSS}}
</head>
<body style="opacity:0;transition:opacity 0.5s ease;">

  <canvas id="bg-woof" aria-hidden="true" style="position:fixed;inset:0;width:100%;height:100%;z-index:-1;pointer-events:none;display:block;"></canvas>

  <div id="intro-overlay">
    <div id="intro-card">
      <div id="intro-avatar-wrap"></div>
      <div id="intro-name"></div>
    </div>
  </div>

  <div class="page-wrapper">
    <div class="banner-container">
      {{BANNER_BLOCK}}
    </div>
    <div class="content-container">
      <div class="header-row">
        <div class="avatar-container">
          {{AVATAR_BLOCK}}
        </div>
        <div class="header-main">
          <div class="name-area">
            {{NAME_BLOCK}}
            <div class="slug-tag">{{SLUG}}.shillit.fun</div>
          </div>
          <div class="header-socials">
            {{SOCIAL_BLOCK}}
          </div>
        </div>
      </div>
      {{DESC_BLOCK}}
      {{CONTRACT_BLOCK}}
      {{BUY_BLOCK}}
      <div class="cards-grid">
        {{TOKENOMICS_BLOCK}}
        {{TICKER_BLOCK}}
        {{COUNTDOWN_BLOCK}}
        {{ABOUT_BLOCK}}
        {{ROADMAP_BLOCK}}
      </div>
      {{CHART_BLOCK}}
    </div>
    <div style="text-align:center;padding:24px 0 16px;font-size:11px;">
      <a href="https://report.shillit.fun" target="_blank" rel="noreferrer" style="color:#ffffff;text-decoration:none;">Report →</a>
    </div>
  </div>

  <script>
    // =========================================================================
    // "WOOF" — art-directed twilight scene. Composed, layered, parallax.
    // Layers (far -> near): moon + halo, drifting soft clouds, star/bokeh field,
    // gracefully arcing well-shaded BONES + PAW prints, warm ember fireflies.
    // Designed motion (eased arcs, parallax depth, gentle bob) — not a random field.
    // =========================================================================
    (function () {
      var canvas = document.getElementById('bg-woof');
      if (!canvas || !canvas.getContext) return;
      var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      var ctx = canvas.getContext('2d');
      var w, h, dpr, t = 0, raf, running = true;
      var stars = [], clouds = [], bones = [], paws = [], flies = [], moon;

      var MOON = '207,224,255', EMBER = '255,182,77', EMBERS = '255,213,145', DUSK = '27,42,77';

      function size() {
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        w = window.innerWidth; h = window.innerHeight;
        canvas.width = w * dpr; canvas.height = h * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      // ---- rounded bone, properly shaded (gradient + soft rim) ----
      function drawBone(x, y, L, rot, alpha, scale) {
        var r = L * 0.19 * scale, hw = L * 0.5 * scale, bw = r * 1.35;
        ctx.save();
        ctx.translate(x, y); ctx.rotate(rot); ctx.globalAlpha = alpha;
        var g = ctx.createLinearGradient(-hw, -r, hw, r);
        g.addColorStop(0, 'rgba(' + MOON + ',0.95)');
        g.addColorStop(0.5, 'rgba(235,242,255,0.75)');
        g.addColorStop(1, 'rgba(159,182,230,0.6)');
        ctx.fillStyle = g;
        ctx.shadowColor = 'rgba(' + MOON + ',0.5)'; ctx.shadowBlur = 14 * scale;
        // bar
        ctx.beginPath();
        ctx.moveTo(-hw, -bw * 0.5); ctx.lineTo(hw, -bw * 0.5);
        ctx.lineTo(hw, bw * 0.5); ctx.lineTo(-hw, bw * 0.5); ctx.closePath(); ctx.fill();
        // four knobs
        ctx.beginPath(); ctx.arc(-hw, -r * 0.72, r, 0, 7); ctx.fill();
        ctx.beginPath(); ctx.arc(-hw, r * 0.72, r, 0, 7); ctx.fill();
        ctx.beginPath(); ctx.arc(hw, -r * 0.72, r, 0, 7); ctx.fill();
        ctx.beginPath(); ctx.arc(hw, r * 0.72, r, 0, 7); ctx.fill();
        // subtle top highlight
        ctx.shadowBlur = 0; ctx.globalAlpha = alpha * 0.5;
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.beginPath(); ctx.ellipse(-hw * 0.1, -bw * 0.28, hw * 0.5, bw * 0.16, 0, 0, 7); ctx.fill();
        ctx.restore();
      }

      // ---- paw print, soft-shaded ----
      function drawPaw(x, y, S, rot, alpha) {
        ctx.save();
        ctx.translate(x, y); ctx.rotate(rot); ctx.globalAlpha = alpha;
        var g = ctx.createRadialGradient(0, S * 0.1, S * 0.1, 0, S * 0.1, S);
        g.addColorStop(0, 'rgba(' + EMBERS + ',0.5)');
        g.addColorStop(1, 'rgba(' + EMBER + ',0.12)');
        ctx.fillStyle = g;
        ctx.shadowColor = 'rgba(' + EMBER + ',0.35)'; ctx.shadowBlur = 12;
        ctx.beginPath(); ctx.ellipse(0, S * 0.32, S * 0.5, S * 0.42, 0, 0, 7); ctx.fill();
        ctx.beginPath(); ctx.ellipse(-S * 0.44, -S * 0.26, S * 0.2, S * 0.26, 0, 0, 7); ctx.fill();
        ctx.beginPath(); ctx.ellipse(-S * 0.16, -S * 0.52, S * 0.19, S * 0.26, 0, 0, 7); ctx.fill();
        ctx.beginPath(); ctx.ellipse(S * 0.16, -S * 0.52, S * 0.19, S * 0.26, 0, 0, 7); ctx.fill();
        ctx.beginPath(); ctx.ellipse(S * 0.44, -S * 0.26, S * 0.2, S * 0.26, 0, 0, 7); ctx.fill();
        ctx.restore();
      }

      function build() {
        var mobile = w < 700;
        // Moon — fixed focal point upper-right, gives the scene an anchor.
        moon = { x: w * 0.82, y: h * 0.2, r: mobile ? 46 : 74 };
        // Far star / bokeh field (slow parallax).
        stars = [];
        var sc = mobile ? 46 : 90;
        for (var i = 0; i < sc; i++) stars.push({ x: Math.random() * w, y: Math.random() * h, r: Math.random() * 1.7 + 0.3, tw: Math.random() * 6.28, sp: 0.6 + Math.random() * 1.4 });
        // Mid soft clouds (very slow drift).
        clouds = [];
        var cc = mobile ? 3 : 5;
        for (var c = 0; c < cc; c++) clouds.push({ x: Math.random() * w, y: h * (0.12 + Math.random() * 0.5), r: (mobile ? 120 : 200) + Math.random() * 160, sp: 0.06 + Math.random() * 0.08, a: 0.05 + Math.random() * 0.05 });
        // Near bones — arc gracefully across on eased sine paths (parallax, foreground).
        bones = [];
        var bc = mobile ? 5 : 9;
        for (var b = 0; b < bc; b++) bones.push(newBone(Math.random()));
        // Paw prints appear/fade along a gentle trail.
        paws = [];
        var pc = mobile ? 4 : 8;
        for (var p = 0; p < pc; p++) paws.push(newPaw(Math.random() * 3));
        // Warm ember fireflies (tiny glowing dots, gentle wander).
        flies = [];
        var fc = mobile ? 10 : 20;
        for (var f = 0; f < fc; f++) flies.push({ x: Math.random() * w, y: Math.random() * h, ph: Math.random() * 6.28, sp: 0.3 + Math.random() * 0.5, r: Math.random() * 1.6 + 0.6, drift: Math.random() * 6.28 });
      }

      function newBone(life) {
        var mobile = w < 700;
        return {
          baseY: h * (0.15 + Math.random() * 0.7),
          amp: 30 + Math.random() * 70,
          L: (mobile ? 30 : 40) + Math.random() * (mobile ? 16 : 30),
          scale: 0.6 + Math.random() * 0.7,
          spin: (Math.random() - 0.5) * 0.5,
          rot0: Math.random() * 6.28,
          sp: 0.15 + Math.random() * 0.22,
          life: life, phase: Math.random() * 6.28
        };
      }
      function newPaw(life) {
        return { x: Math.random() * w, y: Math.random() * h, S: 15 + Math.random() * 16, rot: (Math.random() - 0.5) * 0.9, life: life, sp: 0.004 + Math.random() * 0.004 };
      }

      function frame() {
        if (!running) return;
        t += 0.01;
        ctx.clearRect(0, 0, w, h);

        // Vertical dusk wash for depth.
        var sky = ctx.createLinearGradient(0, 0, 0, h);
        sky.addColorStop(0, 'rgba(17,26,51,0.55)');
        sky.addColorStop(0.6, 'rgba(10,15,30,0.2)');
        sky.addColorStop(1, 'rgba(10,15,30,0.6)');
        ctx.fillStyle = sky; ctx.fillRect(0, 0, w, h);

        // Moon halo + moon.
        var halo = ctx.createRadialGradient(moon.x, moon.y, 0, moon.x, moon.y, moon.r * 4.2);
        halo.addColorStop(0, 'rgba(' + MOON + ',0.18)');
        halo.addColorStop(1, 'rgba(' + MOON + ',0)');
        ctx.fillStyle = halo; ctx.fillRect(0, 0, w, h);
        var mg = ctx.createRadialGradient(moon.x - moon.r * 0.3, moon.y - moon.r * 0.3, moon.r * 0.2, moon.x, moon.y, moon.r);
        mg.addColorStop(0, 'rgba(245,249,255,0.9)');
        mg.addColorStop(1, 'rgba(' + MOON + ',0.35)');
        ctx.fillStyle = mg;
        ctx.beginPath(); ctx.arc(moon.x, moon.y, moon.r, 0, 7); ctx.fill();

        // Clouds (soft, slow).
        for (var c = 0; c < clouds.length; c++) {
          var cl = clouds[c]; cl.x += cl.sp;
          if (cl.x - cl.r > w) cl.x = -cl.r;
          var cg = ctx.createRadialGradient(cl.x, cl.y, 0, cl.x, cl.y, cl.r);
          cg.addColorStop(0, 'rgba(' + DUSK + ',' + cl.a + ')');
          cg.addColorStop(1, 'rgba(' + DUSK + ',0)');
          ctx.fillStyle = cg; ctx.beginPath(); ctx.arc(cl.x, cl.y, cl.r, 0, 7); ctx.fill();
        }

        // Stars twinkle (far parallax — drift very slightly with time).
        for (var i = 0; i < stars.length; i++) {
          var s = stars[i];
          var tw = 0.4 + 0.6 * Math.abs(Math.sin(t * s.sp + s.tw));
          ctx.globalAlpha = tw * 0.8;
          ctx.fillStyle = 'rgba(' + MOON + ',1)';
          ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, 7); ctx.fill();
        }
        ctx.globalAlpha = 1;

        // Paw trail (fade in/hold/out).
        for (var p = 0; p < paws.length; p++) {
          var pw = paws[p]; pw.life += pw.sp;
          if (pw.life > 3) { paws[p] = newPaw(0); continue; }
          var pa = pw.life < 1 ? pw.life : (pw.life < 2 ? 1 : 3 - pw.life);
          drawPaw(pw.x, pw.y, pw.S, pw.rot, pa * 0.9);
        }

        // Bones arc across on eased sine paths (composed, parallax foreground).
        for (var b = 0; b < bones.length; b++) {
          var bo = bones[b]; bo.life += 0.0016 + bo.sp * 0.0016;
          if (bo.life > 1) { bones[b] = newBone(0); continue; }
          var x = -80 + bo.life * (w + 160);
          var y = bo.baseY + Math.sin(bo.life * Math.PI * 2 + bo.phase) * bo.amp;
          var rot = bo.rot0 + bo.life * 6.28 * bo.spin;
          var edge = Math.min(1, Math.min(bo.life, 1 - bo.life) * 6); // fade at edges
          drawBone(x, y, bo.L, rot, 0.85 * edge, bo.scale);
        }

        // Ember fireflies (warm, gentle wander + glow pulse).
        for (var f = 0; f < flies.length; f++) {
          var fl = flies[f];
          fl.x += Math.cos(t * fl.sp + fl.drift) * 0.4;
          fl.y += Math.sin(t * fl.sp * 0.8 + fl.ph) * 0.3;
          var gl = 0.4 + 0.6 * Math.abs(Math.sin(t * 1.6 + fl.ph));
          ctx.save(); ctx.globalAlpha = gl * 0.8;
          ctx.shadowColor = 'rgba(' + EMBER + ',0.9)'; ctx.shadowBlur = 10;
          ctx.fillStyle = 'rgba(' + EMBERS + ',1)';
          ctx.beginPath(); ctx.arc(fl.x, fl.y, fl.r, 0, 7); ctx.fill();
          ctx.restore();
        }

        raf = requestAnimationFrame(frame);
      }

      function start() { size(); build(); if (reduce) { drawStatic(); } else { frame(); } }
      // Static, still-pretty fallback for reduced-motion users.
      function drawStatic() {
        t = 1; ctx.clearRect(0, 0, w, h);
        var sky = ctx.createLinearGradient(0, 0, 0, h);
        sky.addColorStop(0, 'rgba(17,26,51,0.55)'); sky.addColorStop(1, 'rgba(10,15,30,0.6)');
        ctx.fillStyle = sky; ctx.fillRect(0, 0, w, h);
        var mg = ctx.createRadialGradient(moon.x, moon.y, moon.r * 0.2, moon.x, moon.y, moon.r);
        mg.addColorStop(0, 'rgba(245,249,255,0.9)'); mg.addColorStop(1, 'rgba(' + MOON + ',0.35)');
        ctx.fillStyle = mg; ctx.beginPath(); ctx.arc(moon.x, moon.y, moon.r, 0, 7); ctx.fill();
        for (var i = 0; i < stars.length; i++) { ctx.globalAlpha = 0.6; ctx.fillStyle = 'rgba(' + MOON + ',1)'; ctx.beginPath(); ctx.arc(stars[i].x, stars[i].y, stars[i].r, 0, 7); ctx.fill(); }
        ctx.globalAlpha = 1;
      }

      start();
      var rt;
      window.addEventListener('resize', function () { clearTimeout(rt); rt = setTimeout(function () { size(); build(); if (reduce) drawStatic(); }, 200); });
      document.addEventListener('visibilitychange', function () {
        if (document.hidden) { running = false; if (raf) cancelAnimationFrame(raf); }
        else if (!running && !reduce) { running = true; frame(); }
      });
    })();

    // Body fade in
    document.body.style.opacity = '0';

    // Intro overlay
    (function () {
      var overlay = document.getElementById('intro-overlay');
      var card = document.getElementById('intro-card');
      var avatarWrap = document.getElementById('intro-avatar-wrap');
      var introName = document.getElementById('intro-name');
      var avatarImg = document.querySelector('.avatar-img');
      var avatarPlaceholder = document.querySelector('.avatar-placeholder');
      var tokenName = document.querySelector('.token-name');
      if (avatarImg) {
        var img = document.createElement('img');
        img.src = avatarImg.src;
        img.style.cssText = 'width:220px;height:220px;border-radius:50%;object-fit:cover;border:4px solid rgba(207,224,255,0.35);box-shadow:0 0 90px rgba(159,182,230,0.4);';
        avatarWrap.appendChild(img);
      } else if (avatarPlaceholder) {
        var ph = document.createElement('div');
        ph.textContent = avatarPlaceholder.textContent;
        ph.style.cssText = 'width:220px;height:220px;border-radius:50%;background:rgba(159,182,230,0.12);border:4px solid rgba(207,224,255,0.35);display:flex;align-items:center;justify-content:center;font-size:80px;';
        avatarWrap.appendChild(ph);
      }
      if (tokenName) {
        introName.textContent = tokenName.textContent;
        var slugTag = document.querySelector('.slug-tag');
        if (slugTag) introName.style.color = window.getComputedStyle(slugTag).color;
      }
      setTimeout(function () { document.body.style.opacity = '1'; }, 50);
      setTimeout(function () { card.style.opacity = '1'; card.style.transform = 'scale(1)'; }, 150);
      setTimeout(function () { overlay.style.opacity = '0'; setTimeout(function () { overlay.style.display = 'none'; }, 1000); }, 1800);
    })();

    // Scroll fade-in
    (function () {
      var els = document.querySelectorAll('.card, .tokenomics-block, .description-block, .contract-block, .buy-links, .header-row');
      els.forEach(function (el) { el.style.opacity = '0'; el.style.transform = 'translateY(24px)'; el.style.transition = 'opacity 0.5s ease, transform 0.5s ease'; });
      var obs = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) { if (e.isIntersecting) { e.target.style.opacity = '1'; e.target.style.transform = 'translateY(0)'; obs.unobserve(e.target); } });
      }, { threshold: 0.1 });
      setTimeout(function () { els.forEach(function (el) { obs.observe(el); }); }, 2000);
    })();

    // Countdown
    document.querySelectorAll('.countdown-card').forEach(function (card) {
      var target = parseInt(card.getAttribute('data-target'));
      if (!target) return;
      function upd() {
        var diff = target - Date.now();
        if (diff <= 0) { card.querySelector('.countdown-grid').innerHTML = '<div class="countdown-launched">Launched!</div>'; return; }
        var d = Math.floor(diff / 86400000), hh = Math.floor((diff % 86400000) / 3600000), m = Math.floor((diff % 3600000) / 60000), s = Math.floor((diff % 60000) / 1000);
        var dn = card.querySelector('.cd-days'); if (dn) dn.textContent = d;
        var hn = card.querySelector('.cd-hours'); if (hn) hn.textContent = String(hh).padStart(2, '0');
        var mn = card.querySelector('.cd-mins'); if (mn) mn.textContent = String(m).padStart(2, '0');
        var sn = card.querySelector('.cd-secs'); if (sn) sn.textContent = String(s).padStart(2, '0');
      }
      upd(); setInterval(upd, 1000);
    });

    // Ticker
    document.querySelectorAll('.ticker-card').forEach(function (card) {
      var ca = card.getAttribute('data-ca'); if (!ca) return;
      var content = card.querySelector('.ticker-content'); if (!content) return;
      fetch('https://api.dexscreener.com/latest/dex/tokens/' + ca)
        .then(function (r) { return r.json(); })
        .then(function (d) {
          var pairs = d && d.pairs && d.pairs.length > 0 ? d.pairs : null;
          if (!pairs) { content.innerHTML = '<div class="ticker-na">No price data found</div>'; return; }
          var p = pairs[0];
          var price = p.priceUsd ? '$' + parseFloat(p.priceUsd).toFixed(8) : 'N/A';
          var change = p.priceChange && p.priceChange.h24 !== undefined ? p.priceChange.h24 : null;
          var ch = change !== null ? '<span class="ticker-change ' + (change >= 0 ? 'positive' : 'negative') + '">' + (change >= 0 ? '+' : '') + parseFloat(change).toFixed(2) + '%</span>' : '';
          var mcap = p.marketCap ? '$' + Number(p.marketCap).toLocaleString() : 'N/A';
          var vol = p.volume && p.volume.h24 ? '$' + Number(p.volume.h24).toLocaleString() : 'N/A';
          content.innerHTML = '<div class="ticker-price">' + price + ' ' + ch + '</div><div class="ticker-stats"><span>MCap: ' + mcap + '</span><span>Vol 24h: ' + vol + '</span></div>';
        })
        .catch(function () { content.innerHTML = '<div class="ticker-na">Price data unavailable</div>'; });
    });
  </script>
</body>
</html>
