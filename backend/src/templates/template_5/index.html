<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{TOKEN_NAME}}</title>
  {{OG_TAGS}}
  {{CSS}}
</head>
<body style="opacity:0;transition:opacity 0.5s ease;">

  <canvas id="bg-gl" aria-hidden="true" style="position:fixed;inset:0;width:100%;height:100%;z-index:-1;pointer-events:none;display:block;"></canvas>

  <div id="intro-overlay">
    <div id="intro-card">
      <div id="intro-avatar-wrap"></div>
      <div id="intro-name"></div>
    </div>
  </div>

  <div class="page-wrapper">
    <div class="banner-container">
      {{BANNER_BLOCK}}
    </div>
    <div class="content-container">
      <div class="header-row">
        <div class="avatar-container">
          {{AVATAR_BLOCK}}
        </div>
        <div class="header-main">
          <div class="name-area">
            {{NAME_BLOCK}}
            <div class="slug-tag">{{SLUG}}.shillit.fun</div>
          </div>
          <div class="header-socials">
            {{SOCIAL_BLOCK}}
          </div>
        </div>
      </div>
      {{DESC_BLOCK}}
      {{CONTRACT_BLOCK}}
      {{BUY_BLOCK}}
      <div class="cards-grid">
        {{TOKENOMICS_BLOCK}}
        {{TICKER_BLOCK}}
        {{COUNTDOWN_BLOCK}}
        {{ABOUT_BLOCK}}
        {{ROADMAP_BLOCK}}
      </div>
      {{CHART_BLOCK}}
    </div>
    <div style="text-align:center;padding:24px 0 16px;font-size:11px;">
      <a href="https://report.shillit.fun" target="_blank" rel="noreferrer" style="color:#ffffff;text-decoration:none;">Report →</a>
    </div>
  </div>

  <script>
    // ===== Golden blockchain mesh — classy, layered, drifting upward =====
    (function() {
      var canvas = document.getElementById('bg-gl');
      if (!canvas || !canvas.getContext) return;
      if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      var ctx = canvas.getContext('2d');
      var w, h, dpr, raf, running = true, t = 0;
      var nodes, motes, spawnTimer = 0, pulses = [];
      var GOLD = '200,168,75';
      var LITE = '240,208,112';
      var HI   = '255,232,150';

      function size() {
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        w = window.innerWidth; h = window.innerHeight;
        canvas.width = w * dpr; canvas.height = h * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      }

      function build() {
        var mobile = w < 700;
        var count = mobile ? Math.round(w * h / 42000) : Math.round(w * h / 26000);
        count = Math.max(mobile ? 10 : 22, Math.min(mobile ? 26 : 60, count));
        nodes = [];
        for (var i = 0; i < count; i++) {
          var depth = Math.random();
          nodes.push({
            x: Math.random() * w,
            y: Math.random() * h,
            z: depth,
            r: depth * 3.0 + 1.4,
            vy: -(0.10 + depth * 0.28),
            vx: (Math.random() - 0.5) * 0.12,
            rot: Math.random() * Math.PI,
            spin: (Math.random() - 0.5) * 0.004,
            ph: Math.random() * Math.PI * 2
          });
        }
        var mcount = mobile ? 26 : 70;
        motes = [];
        for (var m = 0; m < mcount; m++) {
          motes.push({
            x: Math.random() * w, y: Math.random() * h,
            vy: -(0.08 + Math.random() * 0.22),
            r: Math.random() * 1.1 + 0.3,
            a: Math.random() * 0.4 + 0.15,
            tw: Math.random() * Math.PI * 2
          });
        }
        pulses = [];
      }

      function hex(x, y, r, rot) {
        ctx.beginPath();
        for (var i = 0; i < 6; i++) {
          var ang = rot + i * Math.PI / 3;
          var px = x + Math.cos(ang) * r, py = y + Math.sin(ang) * r;
          if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.closePath();
      }

      var LINK;
      function draw() {
        if (!running) return;
        t += 0.006;
        LINK = w < 700 ? 120 : 165;

        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = '#04010f';
        ctx.fillRect(0, 0, w, h);
        var gx = w * 0.5, gy = h * 0.42;
        var grd = ctx.createRadialGradient(gx, gy, 0, gx, gy, Math.max(w, h) * 0.6);
        grd.addColorStop(0, 'rgba(' + GOLD + ',0.05)');
        grd.addColorStop(1, 'rgba(' + GOLD + ',0)');
        ctx.fillStyle = grd; ctx.fillRect(0, 0, w, h);

        ctx.globalCompositeOperation = 'lighter';

        for (var mi = 0; mi < motes.length; mi++) {
          var mo = motes[mi];
          mo.y += mo.vy; mo.tw += 0.03;
          if (mo.y < -6) { mo.y = h + 6; mo.x = Math.random() * w; }
          var ta = mo.a * (0.5 + 0.5 * Math.sin(mo.tw));
          ctx.beginPath();
          ctx.arc(mo.x, mo.y, mo.r, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(' + LITE + ',' + ta + ')';
          ctx.fill();
        }

        for (var i = 0; i < nodes.length; i++) {
          var n = nodes[i];
          n.y += n.vy; n.x += n.vx; n.rot += n.spin;
          if (n.y < -20) { n.y = h + 20; n.x = Math.random() * w; }
          if (n.x < -20) n.x = w + 20; else if (n.x > w + 20) n.x = -20;
        }

        var closePairs = [];
        for (var a = 0; a < nodes.length; a++) {
          for (var b = a + 1; b < nodes.length; b++) {
            var dx = nodes[a].x - nodes[b].x, dy = nodes[a].y - nodes[b].y;
            var d = Math.sqrt(dx * dx + dy * dy);
            if (d < LINK) {
              var str = 1 - d / LINK;
              ctx.strokeStyle = 'rgba(' + GOLD + ',' + (str * 0.16) + ')';
              ctx.lineWidth = 0.5 + str * 0.7;
              ctx.beginPath();
              ctx.moveTo(nodes[a].x, nodes[a].y);
              ctx.lineTo(nodes[b].x, nodes[b].y);
              ctx.stroke();
              if (str > 0.5) closePairs.push([a, b]);
            }
          }
        }

        spawnTimer--;
        if (spawnTimer <= 0 && closePairs.length) {
          spawnTimer = (w < 700 ? 34 : 20) + (Math.random() * 40 | 0);
          var pr = closePairs[(Math.random() * closePairs.length) | 0];
          pulses.push({ a: pr[0], b: pr[1], t: 0, sp: 0.015 + Math.random() * 0.02 });
          if (pulses.length > 14) pulses.shift();
        }
        for (var pi = pulses.length - 1; pi >= 0; pi--) {
          var pl = pulses[pi]; pl.t += pl.sp;
          if (pl.t >= 1) { pulses.splice(pi, 1); continue; }
          var na = nodes[pl.a], nb = nodes[pl.b];
          if (!na || !nb) { pulses.splice(pi, 1); continue; }
          var px = na.x + (nb.x - na.x) * pl.t, py = na.y + (nb.y - na.y) * pl.t;
          ctx.beginPath();
          ctx.arc(px, py, 1.6, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(' + HI + ',0.7)';
          ctx.fill();
        }

        for (var k = 0; k < nodes.length; k++) {
          var p = nodes[k];
          var tw = 0.6 + 0.4 * Math.sin(t * 1.6 + p.ph);
          hex(p.x, p.y, p.r, p.rot);
          ctx.fillStyle = 'rgba(' + GOLD + ',' + (0.05 + 0.05 * p.z) + ')';
          ctx.fill();
          hex(p.x, p.y, p.r, p.rot);
          ctx.strokeStyle = 'rgba(' + LITE + ',' + ((0.28 * tw + 0.12) * (0.5 + p.z * 0.5)) + ')';
          ctx.lineWidth = 0.8 + p.z * 0.7;
          ctx.stroke();
          if (p.z > 0.55) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, 0.9, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(' + HI + ',' + (0.5 * tw) + ')';
            ctx.fill();
          }
        }

        ctx.globalCompositeOperation = 'source-over';
        raf = requestAnimationFrame(draw);
      }

      size(); build(); draw();
      var rt;
      window.addEventListener('resize', function() { clearTimeout(rt); rt = setTimeout(function(){ size(); build(); }, 200); });
      document.addEventListener('visibilitychange', function() {
        if (document.hidden) { running = false; if (raf) cancelAnimationFrame(raf); }
        else if (!running) { running = true; draw(); }
      });
    })();

    // Body fade in
    document.body.style.opacity = '0';

    // Intro overlay
    (function() {
      var overlay = document.getElementById('intro-overlay');
      var card = document.getElementById('intro-card');
      var avatarWrap = document.getElementById('intro-avatar-wrap');
      var introName = document.getElementById('intro-name');

      var avatarImg = document.querySelector('.avatar-img');
      var avatarPlaceholder = document.querySelector('.avatar-placeholder');
      var tokenName = document.querySelector('.token-name');

      if (avatarImg) {
        var img = document.createElement('img');
        img.src = avatarImg.src;
        img.style.cssText = 'width:220px;height:220px;border-radius:50%;object-fit:cover;border:4px solid rgba(255,255,255,0.25);box-shadow:0 0 80px rgba(0,0,0,0.5);';
        avatarWrap.appendChild(img);
      } else if (avatarPlaceholder) {
        var ph = document.createElement('div');
        ph.textContent = avatarPlaceholder.textContent;
        ph.style.cssText = 'width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,0.1);border:4px solid rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;font-size:80px;';
        avatarWrap.appendChild(ph);
      }

      if (tokenName) {
        introName.textContent = tokenName.textContent;
        var slugTag = document.querySelector('.slug-tag');
        if (slugTag) {
          introName.style.color = window.getComputedStyle(slugTag).color;
        }
      }

      setTimeout(function() { document.body.style.opacity = '1'; }, 50);
      setTimeout(function() { card.style.opacity = '1'; card.style.transform = 'scale(1)'; }, 150);
      setTimeout(function() {
        overlay.style.opacity = '0';
        setTimeout(function() { overlay.style.display = 'none'; }, 1000);
      }, 1800);
    })();

    // Scroll fade-in for cards
    (function() {
      var cards = document.querySelectorAll('.card, .tokenomics-block, .description-block, .contract-block, .buy-links, .header-row');
      cards.forEach(function(el) {
        el.style.opacity = '0';
        el.style.transform = 'translateY(24px)';
        el.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
      });

      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            entry.target.style.opacity = '1';
            entry.target.style.transform = 'translateY(0)';
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1 });

      setTimeout(function() {
        cards.forEach(function(el) { observer.observe(el); });
      }, 2000);
    })();

    // Countdown timers
    document.querySelectorAll('.countdown-card').forEach(function(card) {
      var target = parseInt(card.getAttribute('data-target'));
      if (!target) return;
      function update() {
        var diff = target - Date.now();
        if (diff <= 0) {
          card.querySelector('.countdown-grid').innerHTML = '<div class="countdown-launched">Launched!</div>';
          return;
        }
        var d = Math.floor(diff / 86400000);
        var h = Math.floor((diff % 86400000) / 3600000);
        var m = Math.floor((diff % 3600000) / 60000);
        var s = Math.floor((diff % 60000) / 1000);
        var dn = card.querySelector('.cd-days'); if (dn) dn.textContent = d;
        var hn = card.querySelector('.cd-hours'); if (hn) hn.textContent = String(h).padStart(2,'0');
        var mn = card.querySelector('.cd-mins'); if (mn) mn.textContent = String(m).padStart(2,'0');
        var sn = card.querySelector('.cd-secs'); if (sn) sn.textContent = String(s).padStart(2,'0');
      }
      update();
      setInterval(update, 1000);
    });

    // Price ticker
    document.querySelectorAll('.ticker-card').forEach(function(card) {
      var ca = card.getAttribute('data-ca');
      if (!ca) return;
      var content = card.querySelector('.ticker-content');
      if (!content) return;
      fetch('https://api.dexscreener.com/latest/dex/tokens/' + ca)
        .then(function(r) { return r.json(); })
        .then(function(d) {
          var pairs = d && d.pairs && d.pairs.length > 0 ? d.pairs : null;
          if (!pairs) { content.innerHTML = '<div class="ticker-na">No price data found</div>'; return; }
          var p = pairs[0];
          var price = p.priceUsd ? '$' + parseFloat(p.priceUsd).toFixed(8) : 'N/A';
          var change = p.priceChange && p.priceChange.h24 !== undefined ? p.priceChange.h24 : null;
          var changeHtml = change !== null ? '<span class="ticker-change ' + (change >= 0 ? 'positive' : 'negative') + '">' + (change >= 0 ? '+' : '') + parseFloat(change).toFixed(2) + '%</span>' : '';
          var mcap = p.marketCap ? '$' + Number(p.marketCap).toLocaleString() : 'N/A';
          var vol = p.volume && p.volume.h24 ? '$' + Number(p.volume.h24).toLocaleString() : 'N/A';
          content.innerHTML = '<div class="ticker-price">' + price + ' ' + changeHtml + '</div><div class="ticker-stats"><span>MCap: ' + mcap + '</span><span>Vol 24h: ' + vol + '</span></div>';
        })
        .catch(function() { content.innerHTML = '<div class="ticker-na">Price data unavailable</div>'; });
    });
  </script>
</body>
</html>
