<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{TOKEN_NAME}}</title>
  {{OG_TAGS}}
  {{CSS}}
</head>
<body style="opacity:0;transition:opacity 0.5s ease;">

  <canvas id="bg-storm" aria-hidden="true" style="position:fixed;inset:0;width:100%;height:100%;z-index:-1;pointer-events:none;display:block;"></canvas>

  <div id="intro-overlay">
    <div id="intro-card">
      <div id="intro-avatar-wrap"></div>
      <div id="intro-name"></div>
    </div>
  </div>

  <div class="page-wrapper">
    <div class="banner-container">
      {{BANNER_BLOCK}}
    </div>
    <div class="content-container">
      <div class="header-row">
        <div class="avatar-container">
          {{AVATAR_BLOCK}}
        </div>
        <div class="header-main">
          <div class="name-area">
            {{NAME_BLOCK}}
            <div class="slug-tag">{{SLUG}}.shillit.fun</div>
          </div>
          <div class="header-socials">
            {{SOCIAL_BLOCK}}
          </div>
        </div>
      </div>
      {{DESC_BLOCK}}
      {{CONTRACT_BLOCK}}
      {{BUY_BLOCK}}
      <div class="cards-grid">
        {{TOKENOMICS_BLOCK}}
        {{TICKER_BLOCK}}
        {{COUNTDOWN_BLOCK}}
        {{ABOUT_BLOCK}}
        {{ROADMAP_BLOCK}}
      </div>
      {{CHART_BLOCK}}
    </div>
    <div style="text-align:center;padding:24px 0 16px;font-size:11px;">
      <a href="https://report.shillit.fun" target="_blank" rel="noreferrer" style="color:#ffffff;text-decoration:none;">Report →</a>
    </div>
  </div>

  <script>
    // ===== Electric Storm v4: realistic core+halo bolts, tight jags, rare flashes =====
    (function() {
      var canvas = document.getElementById('bg-storm');
      if (!canvas || !canvas.getContext) return;
      if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      var ctx = canvas.getContext('2d');
      var w, h, dpr, raf, running = true;
      var bolts = [], sparks = [], spawnTimer = 0, flash = 0;
      var WHITE = '225,235,255';
      var GLOW = '110,140,255';
      var DEEP = '60,80,230';

      function size() {
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        w = window.innerWidth; h = window.innerHeight;
        canvas.width = w * dpr; canvas.height = h * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        ctx.fillStyle = '#060b18';
        ctx.fillRect(0, 0, w, h);
      }

      function makeBolt() {
        var startX = Math.random() * w;
        var endY = (w < 700) ? h * (0.32 + Math.random() * 0.26) : h * (0.5 + Math.random() * 0.42);
        var drift = (Math.random() - 0.5) * w * 0.25;
        var seg = 10 + Math.random() * 6;
        var steps = Math.max(20, Math.floor(endY / seg));
        var pts = [[startX, -10]];
        var x = startX, y = -10;
        for (var i = 1; i <= steps; i++) {
          var prog = i / steps;
          var aimX = startX + drift * prog;
          var jit = (10 + Math.random() * 16) * (1 - prog * 0.4);
          x += (aimX - x) * 0.25 + (Math.random() - 0.5) * jit;
          y = endY * prog;
          pts.push([x, y]);
        }
        var branches = [];
        for (var b = 4; b < pts.length - 2; b++) {
          if (Math.random() < 0.12) {
            var bsteps = 4 + (Math.random() * 5 | 0);
            var bx = pts[b][0], by = pts[b][1], bpts = [[bx, by]];
            var bdir = (Math.random() < 0.5 ? -1 : 1);
            for (var j = 0; j < bsteps; j++) {
              bx += bdir * (6 + Math.random() * 14);
              by += (6 + Math.random() * 12);
              bpts.push([bx, by]);
            }
            branches.push({ at: b, pts: bpts, sparked: false });
          }
        }
        return {
          pts: pts, branches: branches,
          grow: 0, growMax: pts.length,
          growSpeed: 1.2 + Math.random() * 0.8,
          hold: 0, holdMax: 6 + (Math.random() * 8 | 0),
          fade: 1, phase: 'grow',
          doFlash: Math.random() < 0.2,
          flashed: false, forks: []
        };
      }

      function makeFork(x, y) {
        var n = 5 + (Math.random() * 5 | 0);
        var pts = [[x, y]];
        var dir = Math.random() * Math.PI * 2;
        var px = x, py = y;
        for (var i = 0; i < n; i++) {
          dir += (Math.random() - 0.5) * 1.2;
          var len = 8 + Math.random() * 16;
          px += Math.cos(dir) * len;
          py += Math.sin(dir) * len + 2;
          pts.push([px, py]);
        }
        return { pts: pts, life: 0, max: 10 + (Math.random() * 10 | 0) };
      }

      function spawnBolt() {
        bolts.push(makeBolt());
        if (bolts.length > (w < 700 ? 2 : 4)) bolts.shift();
      }

      function strokePath(pts, upto, alpha, width, col) {
        if (upto < 2) return;
        var n = Math.min(upto, pts.length);
        ctx.strokeStyle = 'rgba(' + col + ',' + alpha + ')';
        ctx.lineWidth = width;
        ctx.beginPath();
        ctx.moveTo(pts[0][0], pts[0][1]);
        for (var i = 1; i < n; i++) ctx.lineTo(pts[i][0], pts[i][1]);
        ctx.stroke();
      }

      function addSpark(x, y) {
        sparks.push({ x: x, y: y, vx: (Math.random()-0.5)*3.2, vy: (Math.random()-0.5)*3.2 + 0.2,
          life: 0, max: 26 + Math.random()*34, r: Math.random()*2.4+0.9 });
      }

      function draw() {
        if (!running) return;

        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = 'rgba(6,11,24,0.20)';
        ctx.fillRect(0, 0, w, h);

        ctx.globalCompositeOperation = 'lighter';

        if (flash > 0) {
          ctx.fillStyle = 'rgba(120,140,255,' + (flash * 0.06) + ')';
          ctx.fillRect(0, 0, w, h);
          flash -= 0.09;
          if (flash < 0) flash = 0;
        }

        var hz = ctx.createLinearGradient(0, 0, 0, h * 0.55);
        hz.addColorStop(0, 'rgba(' + DEEP + ',0.08)');
        hz.addColorStop(1, 'rgba(' + DEEP + ',0)');
        ctx.fillStyle = hz; ctx.fillRect(0, 0, w, h);

        spawnTimer--;
        if (spawnTimer <= 0) { spawnBolt(); var mob = w < 700; spawnTimer = (mob ? 70 : 30) + (Math.random() * (mob ? 80 : 50) | 0); }

        for (var bi = bolts.length - 1; bi >= 0; bi--) {
          var bo = bolts[bi];

          if (bo.phase === 'grow') {
            bo.grow += bo.growSpeed;
            if (bo.grow >= bo.growMax) {
              bo.grow = bo.growMax; bo.phase = 'hold';
              if (bo.doFlash && !bo.flashed) { bo.flashed = true; flash = Math.max(flash, 0.6); }
            }
          } else if (bo.phase === 'hold') {
            bo.hold++;
            if (bo.hold >= bo.holdMax) bo.phase = 'fade';
          } else {
            bo.fade -= 0.07;
            if (bo.fade <= 0) { bolts.splice(bi, 1); continue; }
          }

          var revealed = Math.floor(bo.grow);
          var flick = bo.phase === 'fade' ? bo.fade : (0.8 + 0.2 * Math.sin(bo.grow * 1.5));
          var a = flick;

          strokePath(bo.pts, revealed, 0.04 * a, 7, GLOW);
          strokePath(bo.pts, revealed, 0.07 * a, 3, GLOW);
          strokePath(bo.pts, revealed, 0.18 * a, 1.0, WHITE);
          for (var fk = bo.forks.length - 1; fk >= 0; fk--) {
            var fo = bo.forks[fk];
            fo.life++;
            var fa = (1 - fo.life / fo.max) * a;
            if (fo.life > fo.max) { bo.forks.splice(fk, 1); }
            else {
              strokePath(fo.pts, fo.pts.length, 0.04 * fa, 2, GLOW);
              strokePath(fo.pts, fo.pts.length, 0.14 * fa, 0.7, WHITE);
            }
          }
          for (var br = 0; br < bo.branches.length; br++) {
            var bb = bo.branches[br];
            if (revealed >= bb.at) {
              strokePath(bb.pts, bb.pts.length, 0.05 * a, 2.5, GLOW);
              strokePath(bb.pts, bb.pts.length, 0.14 * a, 0.8, WHITE);
              if (!bb.sparked && bo.phase === 'grow') {
                bb.sparked = true;
                var tip = bb.pts[bb.pts.length - 1];
                for (var sp = 0; sp < 5; sp++) addSpark(tip[0], tip[1]);
                if (Math.random() < 0.4) bo.forks.push(makeFork(tip[0], tip[1]));
              }
            }
          }
        }

        for (var s = sparks.length - 1; s >= 0; s--) {
          var spk = sparks[s];
          spk.x += spk.vx; spk.y += spk.vy; spk.vy += 0.02; spk.life++;
          if (spk.life > spk.max) { sparks.splice(s, 1); continue; }
          var sa = (1 - spk.life / spk.max) * 0.7;
          ctx.beginPath();
          ctx.arc(spk.x, spk.y, spk.r * 2.6, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(' + GLOW + ',' + (sa * 0.18) + ')';
          ctx.fill();
          ctx.beginPath();
          ctx.arc(spk.x, spk.y, spk.r, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(' + WHITE + ',' + sa + ')';
          ctx.fill();
        }
        ctx.globalCompositeOperation = 'source-over';

        raf = requestAnimationFrame(draw);
      }

      size(); draw();
      var rt;
      window.addEventListener('resize', function() { clearTimeout(rt); rt = setTimeout(size, 200); });
      document.addEventListener('visibilitychange', function() {
        if (document.hidden) { running = false; if (raf) cancelAnimationFrame(raf); }
        else if (!running) { running = true; draw(); }
      });
    })();

    // Body fade in
    document.body.style.opacity = '0';

    // Intro overlay
    (function() {
      var overlay = document.getElementById('intro-overlay');
      var card = document.getElementById('intro-card');
      var avatarWrap = document.getElementById('intro-avatar-wrap');
      var introName = document.getElementById('intro-name');

      var avatarImg = document.querySelector('.avatar-img');
      var avatarPlaceholder = document.querySelector('.avatar-placeholder');
      var tokenName = document.querySelector('.token-name');

      if (avatarImg) {
        var img = document.createElement('img');
        img.src = avatarImg.src;
        img.style.cssText = 'width:220px;height:220px;border-radius:50%;object-fit:cover;border:4px solid rgba(255,255,255,0.25);box-shadow:0 0 80px rgba(0,0,0,0.5);';
        avatarWrap.appendChild(img);
      } else if (avatarPlaceholder) {
        var ph = document.createElement('div');
        ph.textContent = avatarPlaceholder.textContent;
        ph.style.cssText = 'width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,0.1);border:4px solid rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;font-size:80px;';
        avatarWrap.appendChild(ph);
      }

      if (tokenName) {
        introName.textContent = tokenName.textContent;
        var slugTag = document.querySelector('.slug-tag');
        if (slugTag) {
          introName.style.color = window.getComputedStyle(slugTag).color;
        }
      }

      setTimeout(function() { document.body.style.opacity = '1'; }, 50);
      setTimeout(function() { card.style.opacity = '1'; card.style.transform = 'scale(1)'; }, 150);
      setTimeout(function() {
        overlay.style.opacity = '0';
        setTimeout(function() { overlay.style.display = 'none'; }, 1000);
      }, 1800);
    })();

    // Scroll fade-in for cards
    (function() {
      var cards = document.querySelectorAll('.card, .tokenomics-block, .description-block, .contract-block, .buy-links, .header-row');
      cards.forEach(function(el) {
        el.style.opacity = '0';
        el.style.transform = 'translateY(24px)';
        el.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
      });

      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            entry.target.style.opacity = '1';
            entry.target.style.transform = 'translateY(0)';
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1 });

      setTimeout(function() {
        cards.forEach(function(el) { observer.observe(el); });
      }, 2000);
    })();

    // Countdown timers
    document.querySelectorAll('.countdown-card').forEach(function(card) {
      var target = parseInt(card.getAttribute('data-target'));
      if (!target) return;
      function update() {
        var diff = target - Date.now();
        if (diff <= 0) {
          card.querySelector('.countdown-grid').innerHTML = '<div class="countdown-launched">Launched!</div>';
          return;
        }
        var d = Math.floor(diff / 86400000);
        var h = Math.floor((diff % 86400000) / 3600000);
        var m = Math.floor((diff % 3600000) / 60000);
        var s = Math.floor((diff % 60000) / 1000);
        var dn = card.querySelector('.cd-days'); if (dn) dn.textContent = d;
        var hn = card.querySelector('.cd-hours'); if (hn) hn.textContent = String(h).padStart(2,'0');
        var mn = card.querySelector('.cd-mins'); if (mn) mn.textContent = String(m).padStart(2,'0');
        var sn = card.querySelector('.cd-secs'); if (sn) sn.textContent = String(s).padStart(2,'0');
      }
      update();
      setInterval(update, 1000);
    });

    // Price ticker
    document.querySelectorAll('.ticker-card').forEach(function(card) {
      var ca = card.getAttribute('data-ca');
      if (!ca) return;
      var content = card.querySelector('.ticker-content');
      if (!content) return;
      fetch('https://api.dexscreener.com/latest/dex/tokens/' + ca)
        .then(function(r) { return r.json(); })
        .then(function(d) {
          var pairs = d && d.pairs && d.pairs.length > 0 ? d.pairs : null;
          if (!pairs) { content.innerHTML = '<div class="ticker-na">No price data found</div>'; return; }
          var p = pairs[0];
          var price = p.priceUsd ? '$' + parseFloat(p.priceUsd).toFixed(8) : 'N/A';
          var change = p.priceChange && p.priceChange.h24 !== undefined ? p.priceChange.h24 : null;
          var changeHtml = change !== null ? '<span class="ticker-change ' + (change >= 0 ? 'positive' : 'negative') + '">' + (change >= 0 ? '+' : '') + parseFloat(change).toFixed(2) + '%</span>' : '';
          var mcap = p.marketCap ? '$' + Number(p.marketCap).toLocaleString() : 'N/A';
          var vol = p.volume && p.volume.h24 ? '$' + Number(p.volume.h24).toLocaleString() : 'N/A';
          content.innerHTML = '<div class="ticker-price">' + price + ' ' + changeHtml + '</div><div class="ticker-stats"><span>MCap: ' + mcap + '</span><span>Vol 24h: ' + vol + '</span></div>';
        })
        .catch(function() { content.innerHTML = '<div class="ticker-na">Price data unavailable</div>'; });
    });
  </script>
</body>
</html>
